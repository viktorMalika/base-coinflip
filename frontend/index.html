<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base CoinFlip 🎲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a1a;
            color: #e0e0ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
/// @dev This function is called internally
        }
        .container {
            background: #12122a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
// @notice public view function
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
        .coin {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #b8860b);
            margin: 0 auto 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
            border: 4px solid #daa520;
            transition: transform 0.6s;
        }

        .coin.flipping { animation: flip 0.6s ease-in-out; }
        @keyframes flip {
            0% { transform: rotateY(0); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }
        .input-group {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        input {
            flex: 1;
            padding: 12px;
            background: #1a1a3a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        button {
            padding: 12px 24px;
            background: #0052ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background: #0040cc; }
        button:disabled { background: #333; cursor: not-allowed; }
        .stats {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-top: 24px;
        }
        .stat {
            background: #1a1a3a;
            padding: 12px;
            border-radius: 8px;
        }
        .stat-label { color: #888; font-size: 0.75rem; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 600; margin-top: 4px; }
        .result { margin-top: 16px; font-size: 1.2rem; font-weight: 600; }
        .result.win { color: #4ade80; }
        .result.lose { color: #f87171; }
        .powered { margin-top: 24px; color: #555; font-size: 0.75rem; }
        .powered a { color: #0052ff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 CoinFlip</h1>
        <p class="subtitle">on Base • double or nothing</p>

        <div class="coin" id="coin">🪙</div>
        <div class="input-group">
            <input type="number" id="amount" placeholder="ETH amount" step="0.001" min="0.001" max="0.1" value="0.01">
            <button id="flipBtn" onclick="flip()">Flip</button>
        </div>

        <div class="result" id="result"></div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">Total Flips</div>
                <div class="stat-value" id="totalFlips">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">House Edge</div>
                <div class="stat-value">2.5%</div>
            </div>

            <div class="stat">
                <div class="stat-label">Your Balance</div>
                <div class="stat-value" id="balance">—</div>
            </div>
            <div class="stat">
                <div class="stat-label">Network</div>
                <div class="stat-value">Base</div>
            </div>
        </div>

        <p class="powered">deployed on <a href="https://base.org" target="_blank">Base L2</a></p>
    </div>

    <script>
        // Placeholder — connect wallet + call contract
        const CONTRACT_ADDRESS = '0x...'; // TODO: update after deploy

        async function flip() {
            const btn = document.getElementById('flipBtn');
            const coin = document.getElementById('coin');
            const result = document.getElementById('result');

            btn.disabled = true;
            coin.classList.add('flipping');
            result.textContent = '';

            // Simulate flip (replace with actual contract call)
            setTimeout(() => {
                coin.classList.remove('flipping');
                const won = Math.random() > 0.5;
                if (won) {
                    result.textContent = '🎉 You won!';
                    result.className = 'result win';
                } else {
                    result.textContent = '😔 You lost';
                    result.className = 'result lose';
                }
                btn.disabled = false;
            }, 1500);
        }
    </script>
</body>
</html>
